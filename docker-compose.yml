services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://soccer_user:soccer_pass@db:5432/soccer_wiki
      NEXTAUTH_SECRET: soccer-wiki-secret-key-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: soccer_wiki
      POSTGRES_USER: soccer_user
      POSTGRES_PASSWORD: soccer_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soccer_user -d soccer_wiki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
